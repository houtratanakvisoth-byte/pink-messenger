<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Messenger | Private</title>
    <style>
        :root { --pink-primary: #ff527b; --pink-gradient: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); --bg-gray: #f0f2f5; }
        body { margin: 0; font-family: sans-serif; background-color: var(--bg-gray); height: 100vh; display: flex; flex-direction: column; }
        #login-overlay { position: fixed; top:0; left:0; width:100vw; height:100vh; background: #fff0f3; display: flex; justify-content: center; align-items: center; z-index: 999; }
        .login-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 350px; }
        .login-box input, .login-box select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 25px; box-sizing: border-box; outline: none; }
        .login-box button { background: var(--pink-gradient); color: white; border: none; width: 100%; padding: 12px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .room-bar { background: white; padding: 10px; display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; align-items: center;}
        .messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: white; }
        .msg-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .msg-row.sent { flex-direction: row-reverse; align-self: flex-end; }
        .bubble { padding: 10px; border-radius: 15px; background: #eee; max-width: 70%; word-wrap: break-word; }
        .sent .bubble { background: var(--pink-gradient); color: white; }
        .input-box { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; background: white; }
        #msg-input { flex-grow: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>🌸 Private Messenger 🌸</h2>
            <input type="text" id="username-input" placeholder="Nickname">
            <input type="password" id="password-input" placeholder="Secret Password">
            <select id="avatar-input">
                <option value="💖">💖 Heart</option>
                <option value="🦄">🦄 Unicorn</option>
                <option value="🐱">🐱 Kitten</option>
            </select>
            <button onclick="tryLogin()">Login / Register</button>
            <p id="error-msg" style="color: red; font-size: 12px;"></p>
        </div>
    </div>

    <div class="room-bar">
        <strong>Room: <span id="display-room">global</span></strong>
        <div>
            <input type="text" id="room-input" placeholder="Room ID" style="width:100px; padding: 5px; border-radius: 10px; border: 1px solid #ddd;">
            <button onclick="changeRoom()" style="padding: 5px 15px; border-radius: 10px; border:none; background: var(--pink-primary); color:white; cursor:pointer;">Join</button>
        </div>
    </div>

    <div id="history" class="messages"></div>

    <form class="input-box" id="form">
        <button type="button" onclick="document.getElementById('file-input').click()">📷</button>
        <input type="file" id="file-input" hidden onchange="sendPhoto(this)">
        <input type="text" id="msg-input" placeholder="Type a message...">
        <button type="submit">💖</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "";
        let myAvatar = "";
        let currentRoom = "global";

        // 1. LOGIN LOGIC
        function tryLogin() {
            const user = document.getElementById('username-input').value.trim();
            const pass = document.getElementById('password-input').value.trim();
            if(!user || !pass) return alert("Fill in both boxes!");
            socket.emit('verify user', { username: user, password: pass });
        }

        socket.on('login success', (data) => {
            myName = data.username;
            myAvatar = document.getElementById('avatar-input').value;
            document.getElementById('login-overlay').style.display = 'none';
            socket.emit('join room', 'global'); // Default room
        });

        socket.on('login fail', (msg) => {
            document.getElementById('error-msg').innerText = msg;
        });

        // 2. ROOM LOGIC
        function changeRoom() {
            const roomInput = document.getElementById('room-input');
            const newRoom = roomInput.value.trim().toLowerCase();
            if (newRoom && newRoom !== currentRoom) {
                currentRoom = newRoom;
                document.getElementById('display-room').innerText = newRoom;
                document.getElementById('history').innerHTML = ''; // Clear UI
                socket.emit('join room', newRoom);
                roomInput.value = '';
            }
        }

        // 3. MESSAGING LOGIC
        function appendMessage(data) {
            const div = document.createElement('div');
            div.className = 'msg-row ' + (data.user === myName ? 'sent' : 'received');
            
            let content = `<div class="bubble"><b>${data.avatar} ${data.user}:</b><br>`;
            if(data.text) content += `<span>${data.text}</span>`;
            if(data.image) content += `<br><img src="${data.image}" style="max-width:100%; border-radius:10px; margin-top:5px;">`;
            content += `</div>`;
            
            div.innerHTML = content;
            document.getElementById('history').appendChild(div);
            document.getElementById('history').scrollTop = document.getElementById('history').scrollHeight;
        }

        socket.on('chat message', (data) => appendMessage(data));
        
        socket.on('load history', (list) => {
            document.getElementById('history').innerHTML = '';
            list.forEach(m => appendMessage(m));
        });

        document.getElementById('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('msg-input');
            if(input.value) {
                socket.emit('chat message', { 
                    user: myName, 
                    avatar: myAvatar, 
                    text: input.value, 
                    room: currentRoom 
                });
                input.value = '';
            }
        });

        function sendPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    socket.emit('chat message', {
                        user: myName,
                        avatar: myAvatar,
                        image: e.target.result,
                        room: currentRoom
                    });
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
