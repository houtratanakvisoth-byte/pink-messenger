<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pink Messenger | Pro Call</title>
    <style>
        :root { --pink: #ff527b; --bg: #0f0f0f; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: -apple-system, sans-serif; background: #fff; overflow: hidden; }

        /* --- THE VIDEO CALL OVERLAY --- */
        #video-app-layer {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* FULL SCREEN VIDEO */
        #remote-video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Like your screenshot, keeps the video ratio */
            background: #000;
        }

        /* SMALL SELF PREVIEW (Floating) */
        #local-video { 
            position: absolute; 
            bottom: 100px; 
            right: 20px; 
            width: 120px; 
            border-radius: 12px; 
            border: 2px solid #333;
            z-index: 1001;
        }

        /* BOTTOM CONTROL BAR */
        .call-controls {
            position: absolute;
            bottom: 30px;
            width: 90%;
            max-width: 400px;
            background: rgba(40, 40, 40, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 50px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            z-index: 1002;
        }

        .control-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: white;
            transition: 0.2s;
        }

        .btn-end { background: #ff3b30; }
        .btn-util { background: rgba(255,255,255,0.1); }
        .btn-util:hover { background: rgba(255,255,255,0.2); }

        /* --- FLEXIBLE (PICTURE IN PICTURE) MODE --- */
        #video-app-layer.mini-mode {
            inset: auto;
            top: 20px; right: 20px;
            width: 200px; height: 300px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid #444;
        }
        .mini-mode .call-controls { 
            width: 100%; bottom: 10px; padding: 5px; 
            background: none; backdrop-filter: none;
        }
        .mini-mode .control-btn { width: 35px; height: 35px; font-size: 14px; }
        .mini-mode #local-video { width: 60px; bottom: 60px; right: 10px; }

        /* --- CHAT INTERFACE --- */
        #chat-interface { display: flex; flex-direction: column; height: 100vh; }
        .header { padding: 10px 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px 15px; border-radius: 18px; background: #f0f0f0; max-width: 70%; }
        .sent .bubble { background: var(--pink); color: white; align-self: flex-end; }
        .input-area { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #eee; }
        #msg-input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ddd; outline: none; }

        #login-overlay { position: fixed; inset: 0; background: #fff0f3; display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-box { background: white; padding: 30px; border-radius: 25px; text-align: center; width: 280px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color:var(--pink)">🌸 Pink Messenger</h2>
            <input type="text" id="username-input" placeholder="Username" style="width:90%; padding:10px; margin-bottom:10px; border-radius:20px; border:1px solid #ddd;">
            <input type="password" id="password-input" placeholder="Password" style="width:90%; padding:10px; margin-bottom:10px; border-radius:20px; border:1px solid #ddd;">
            <button onclick="tryLogin()" style="width:100%; padding:12px; border-radius:20px; border:none; background:var(--pink); color:white; font-weight:bold;">Join App</button>
        </div>
    </div>

    <div id="video-app-layer" style="display:none;">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        
        <div class="call-controls">
            <button class="control-btn btn-util" onclick="toggleMini()">🔄</button>
            <button class="control-btn btn-util" onclick="toggleScreenShare()">🖥️</button>
            <button class="control-btn btn-end" onclick="endCall()">📞</button>
        </div>
    </div>

    <div id="chat-interface">
        <div class="header">
            <span style="font-weight:bold; color:var(--pink)">Room: <span id="display-room">global</span></span>
            <div>
                <input type="text" id="room-input" placeholder="ID" style="width:40px; border-radius:10px; border:1px solid #ddd; padding:5px;">
                <button onclick="changeRoom()" style="background:var(--pink); color:white; border:none; padding:5px 10px; border-radius:10px;">Join</button>
                <button onclick="startCall()" style="background:#4CAF50; color:white; border:none; padding:5px 10px; border-radius:10px;">📞 Call</button>
            </div>
        </div>
        <div id="history" class="messages"></div>
        <form class="input-area" id="form">
            <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
            <button type="submit" style="background:none; border:none; font-size:20px;">💖</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "", currentRoom = "global", isMini = false;
        let localStream, peerConnection;
        const servers = { iceServers: [{ urls: 'stun:stun1.l.google.com:19302' }] };

        // SWITCH BETWEEN FULL SCREEN & MINI WINDOW
        function toggleMini() {
            const app = document.getElementById('video-app-layer');
            isMini = !isMini;
            if(isMini) app.classList.add('mini-mode');
            else app.classList.remove('mini-mode');
        }

        // AUTH & CHAT
        function tryLogin() {
            const user = document.getElementById('username-input').value.trim();
            const pass = document.getElementById('password-input').value.trim();
            if(user && pass) socket.emit('verify user', { username: user, password: pass });
        }
        socket.on('login success', (data) => {
            myName = data.username;
            document.getElementById('login-overlay').style.display = 'none';
            socket.emit('join room', 'global');
        });

        function changeRoom() {
            const room = document.getElementById('room-input').value.trim().toLowerCase();
            if (room) {
                currentRoom = room;
                document.getElementById('display-room').innerText = room;
                document.getElementById('history').innerHTML = '';
                socket.emit('join room', room);
                endCall();
            }
        }

        function appendMessage(data) {
            const div = document.createElement('div');
            div.className = 'msg-row ' + (data.user === myName ? 'sent' : 'received');
            div.innerHTML = `<div class="bubble"><b>${data.user}</b><br>${data.text || ''}</div>`;
            const h = document.getElementById('history');
            h.appendChild(div);
            h.scrollTop = h.scrollHeight;
        }
        socket.on('chat message', appendMessage);
        socket.on('load history', (list) => list.forEach(appendMessage));

        document.getElementById('form').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('msg-input');
            if(input.value) {
                socket.emit('chat message', { user: myName, text: input.value, room: currentRoom });
                input.value = '';
            }
        };

        // CALL LOGIC
        async function setupCall() {
            document.getElementById('video-app-layer').style.display = 'flex';
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video').srcObject = localStream;
            peerConnection = new RTCPeerConnection(servers);
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            peerConnection.ontrack = (e) => document.getElementById('remote-video').srcObject = e.streams[0];
            peerConnection.onicecandidate = (e) => e.candidate && socket.emit('video-signal', { type: 'candidate', candidate: e.candidate, room: currentRoom });
        }

        async function startCall() {
            await setupCall();
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('video-signal', { type: 'offer', offer: offer, room: currentRoom });
        }

        socket.on('video-signal', async (data) => {
            if (!peerConnection && data.type === 'offer') await setupCall();
            if (data.type === 'offer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                socket.emit('video-signal', { type: 'answer', answer: answer, room: currentRoom });
            } else if (data.type === 'answer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            } else if (data.type === 'candidate') {
                await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });

        function endCall() {
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(peerConnection) peerConnection.close();
            peerConnection = null;
            document.getElementById('video-app-layer').style.display = 'none';
            isMini = false;
        }

        async function toggleScreenShare() {
            const screen = await navigator.mediaDevices.getDisplayMedia({ video: true });
            const track = screen.getVideoTracks()[0];
            const sender = peerConnection.getSenders().find(s => s.track.kind === 'video');
            sender.replaceTrack(track);
            track.onended = () => sender.replaceTrack(localStream.getVideoTracks()[0]);
        }
    </script>
</body>
</html>
