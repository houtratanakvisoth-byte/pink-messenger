<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Messenger | Video & Chat</title>
    <style>
        :root { --pink-primary: #ff527b; --pink-gradient: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); --bg-gray: #f0f2f5; }
        body { margin: 0; font-family: sans-serif; background-color: var(--bg-gray); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #login-overlay { position: fixed; top:0; left:0; width:100vw; height:100vh; background: #fff0f3; display: flex; justify-content: center; align-items: center; z-index: 999; }
        .login-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 350px; }
        .login-box input, .login-box select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        .login-box button { background: var(--pink-gradient); color: white; border: none; width: 100%; padding: 12px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        
        .room-bar { background: white; padding: 10px; display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; align-items: center;}
        
        /* Video Styling */
        #video-grid { display: none; background: #222; position: relative; height: 300px; width: 100%; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { width: 120px; position: absolute; bottom: 10px; right: 10px; border: 2px solid var(--pink-primary); border-radius: 10px; background: #000; }
        
        .messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: white; }
        .msg-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .msg-row.sent { flex-direction: row-reverse; align-self: flex-end; }
        .bubble { padding: 10px; border-radius: 15px; background: #eee; max-width: 70%; word-wrap: break-word; }
        .sent .bubble { background: var(--pink-gradient); color: white; }
        
        .input-box { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; background: white; }
        #msg-input { flex-grow: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        .btn-call { background: #4CAF50; color: white; border: none; padding: 8px 15px; border-radius: 15px; cursor: pointer; font-weight: bold; }
        .btn-join { background: var(--pink-primary); color: white; border: none; padding: 8px 15px; border-radius: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>🌸 Pink Messenger 🌸</h2>
            <input type="text" id="username-input" placeholder="Nickname">
            <input type="password" id="password-input" placeholder="Secret Password">
            <select id="avatar-input">
                <option value="💖">💖 Heart</option>
                <option value="🦄">🦄 Unicorn</option>
                <option value="🐱">🐱 Kitten</option>
            </select>
            <button onclick="tryLogin()">Login / Register</button>
            <p id="error-msg" style="color: red; font-size: 12px;"></p>
        </div>
    </div>

    <div class="room-bar">
        <strong>Room: <span id="display-room">global</span></strong>
        <div style="display: flex; gap: 5px;">
            <button class="btn-call" onclick="startCall()">📞 Call / Screen</button>
            <input type="text" id="room-input" placeholder="Room ID" style="width:80px; border-radius: 10px; border: 1px solid #ddd; padding: 5px;">
            <button class="btn-join" onclick="changeRoom()">Join</button>
        </div>
    </div>

    <div id="video-grid">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        <div style="position: absolute; top: 10px; left: 10px; display: flex; gap: 10px;">
            <button onclick="endCall()" style="background: #ff4747; color: white; border: none; padding: 5px 15px; border-radius: 20px; cursor: pointer;">Hang Up</button>
            <button onclick="toggleScreenShare()" style="background: rgba(255,255,255,0.8); border: none; padding: 5px 15px; border-radius: 20px; cursor: pointer;">🖥️ Share Screen</button>
        </div>
    </div>

    <div id="history" class="messages"></div>

    <form class="input-box" id="form">
        <button type="button" onclick="document.getElementById('file-input').click()" style="border:none; background:none; font-size: 20px; cursor:pointer;">📷</button>
        <input type="file" id="file-input" hidden onchange="sendPhoto(this)">
        <input type="text" id="msg-input" placeholder="Type a message...">
        <button type="submit" style="border:none; background:none; font-size: 20px; cursor:pointer;">💖</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "";
        let myAvatar = "";
        let currentRoom = "global";

        // WebRTC Variables
        let localStream;
        let peerConnection;
        const servers = { iceServers: [{ urls: 'stun:stun1.l.google.com:19302' }] };

        // --- AUTH LOGIC ---
        function tryLogin() {
            const user = document.getElementById('username-input').value.trim();
            const pass = document.getElementById('password-input').value.trim();
            if(!user || !pass) return alert("Fill in everything!");
            socket.emit('verify user', { username: user, password: pass });
        }

        socket.on('login success', (data) => {
            myName = data.username;
            myAvatar = document.getElementById('avatar-input').value;
            document.getElementById('login-overlay').style.display = 'none';
            socket.emit('join room', 'global');
        });

        socket.on('login fail', (msg) => {
            document.getElementById('error-msg').innerText = msg;
        });

        // --- ROOM LOGIC ---
        function changeRoom() {
            const roomInput = document.getElementById('room-input');
            const newRoom = roomInput.value.trim().toLowerCase();
            if (newRoom && newRoom !== currentRoom) {
                currentRoom = newRoom;
                document.getElementById('display-room').innerText = newRoom;
                document.getElementById('history').innerHTML = '';
                socket.emit('join room', newRoom);
                roomInput.value = '';
                endCall(); // Reset calls when switching rooms
            }
        }

        // --- CHAT LOGIC ---
        function appendMessage(data) {
            const div = document.createElement('div');
            div.className = 'msg-row ' + (data.user === myName ? 'sent' : 'received');
            let content = `<div class="bubble"><b>${data.avatar || '👤'} ${data.user}:</b><br>`;
            if(data.text) content += `<span>${data.text}</span>`;
            if(data.image) content += `<br><img src="${data.image}" style="max-width:100%; border-radius:10px; margin-top:5px;">`;
            content += `</div>`;
            div.innerHTML = content;
            const history = document.getElementById('history');
            history.appendChild(div);
            history.scrollTop = history.scrollHeight;
        }

        socket.on('chat message', (data) => appendMessage(data));
        socket.on('load history', (list) => {
            document.getElementById('history').innerHTML = '';
            list.forEach(m => appendMessage(m));
        });

        document.getElementById('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('msg-input');
            if(input.value) {
                socket.emit('chat message', { user: myName, avatar: myAvatar, text: input.value, room: currentRoom });
                input.value = '';
            }
        });

        function sendPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => socket.emit('chat message', { user: myName, avatar: myAvatar, image: e.target.result, room: currentRoom });
                reader.readAsDataURL(input.files[0]);
            }
        }

        // --- VIDEO CALL LOGIC ---
        async function startCall() {
            document.getElementById('video-grid').style.display = 'block';
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video').srcObject = localStream;

            peerConnection = new RTCPeerConnection(servers);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = (event) => {
                document.getElementById('remote-video').srcObject = event.streams[0];
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('video-signal', { type: 'candidate', candidate: event.candidate, room: currentRoom });
                }
            };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('video-signal', { type: 'offer', offer: offer, room: currentRoom });
        }

        socket.on('video-signal', async (data) => {
            if (!peerConnection && (data.type === 'offer')) {
                // If receiving an incoming call
                document.getElementById('video-grid').style.display = 'block';
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = localStream;
                peerConnection = new RTCPeerConnection(servers);
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                peerConnection.ontrack = (e) => document.getElementById('remote-video').srcObject = e.streams[0];
                peerConnection.onicecandidate = (e) => e.candidate && socket.emit('video-signal', { type: 'candidate', candidate: e.candidate, room: currentRoom });
            }

            if (data.type === 'offer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                socket.emit('video-signal', { type: 'answer', answer: answer, room: currentRoom });
            } else if (data.type === 'answer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            } else if (data.type === 'candidate') {
                await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });

        async function toggleScreenShare() {
            const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            const videoTrack = screenStream.getVideoTracks()[0];
            const sender = peerConnection.getSenders().find(s => s.track.kind === 'video');
            sender.replaceTrack(videoTrack);
            
            videoTrack.onended = () => {
                sender.replaceTrack(localStream.getVideoTracks()[0]);
            };
        }

        function endCall() {
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(peerConnection) peerConnection.close();
            peerConnection = null;
            document.getElementById('video-grid').style.display = 'none';
        }
    </script>
</body>
</html>
