<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pink Messenger | Pro Video</title>
    <style>
        :root { --pink: #ff527b; --pink-grad: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: sans-serif; background: #fff; overflow: hidden; }

        /* --- VIDEO MODES --- */
        #video-container {
            display: none;
            background: #000;
            z-index: 100;
            overflow: hidden;
            transition: all 0.3s ease-in-out;
        }

        /* FULL SCREEN MODE */
        #video-container.full-mode {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
        }

        /* FLEXIBLE / SMALL MODE */
        #video-container.small-mode {
            position: fixed;
            top: 80px;
            right: 20px;
            width: 280px;
            height: 180px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 3px solid white;
        }

        video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { 
            position: absolute; bottom: 10px; right: 10px; 
            width: 80px; border-radius: 10px; border: 1px solid white; 
        }

        /* --- UI LAYER --- */
        #chat-interface {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            background: white;
            transition: opacity 0.3s;
        }

        /* Hide chat completely when video is Full Screen so it's not in background */
        body.video-is-full #chat-interface {
            opacity: 0;
            pointer-events: none;
        }

        .header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; background: white; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px 15px; border-radius: 18px; background: #f0f0f0; max-width: 70%; word-wrap: break-word; }
        .sent .bubble { background: var(--pink-grad); color: white; align-self: flex-end; }
        .msg-row { display: flex; width: 100%; }
        .msg-row.sent { justify-content: flex-end; }

        .input-area { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #eee; background: white; }
        #msg-input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ddd; outline: none; }

        /* Floating Controls */
        .video-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 200;
        }
        .btn { 
            padding: 10px 20px; border-radius: 30px; border: none; 
            color: white; font-weight: bold; cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        #login-overlay { position: fixed; inset: 0; background: #fff0f3; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 30px; border-radius: 25px; text-align: center; width: 280px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color:var(--pink)">🌸 Pink Messenger</h2>
            <input type="text" id="username-input" placeholder="Nickname" style="width:90%; padding:10px; margin-bottom:10px; border-radius:20px; border:1px solid #ddd;">
            <input type="password" id="password-input" placeholder="Password" style="width:90%; padding:10px; margin-bottom:10px; border-radius:20px; border:1px solid #ddd;">
            <button onclick="tryLogin()" style="width:100%; padding:10px; border-radius:20px; border:none; background:var(--pink-grad); color:white; font-weight:bold;">Login</button>
        </div>
    </div>

    <div id="video-container" class="full-mode">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
    </div>

    <div id="chat-interface">
        <div class="header">
            <span style="font-weight:bold; color:var(--pink)">Room: <span id="display-room">global</span></span>
            <div>
                <input type="text" id="room-input" placeholder="ID" style="width:40px; border-radius:10px; border:1px solid #ddd; padding:5px;">
                <button onclick="changeRoom()" style="background:var(--pink); color:white; border:none; padding:5px 10px; border-radius:10px;">Join</button>
                <button onclick="startCall()" style="background:#4CAF50; color:white; border:none; padding:5px 10px; border-radius:10px;">📞 Call</button>
            </div>
        </div>
        <div id="history" class="messages"></div>
        <form class="input-area" id="form">
            <button type="button" onclick="document.getElementById('file-input').click()" style="background:none; border:none; font-size:20px;">📷</button>
            <input type="file" id="file-input" hidden onchange="sendPhoto(this)">
            <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
            <button type="submit" style="background:none; border:none; font-size:20px;">💖</button>
        </form>
    </div>

    <div class="video-controls" id="call-controls" style="display:none;">
        <button class="btn" style="background:#ff4747;" onclick="endCall()">Hang Up</button>
        <button class="btn" style="background:#55acee;" onclick="toggleFlexMode()" id="flex-btn">Flexible Mode</button>
        <button class="btn" style="background:#888;" onclick="toggleScreenShare()">Share</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "", currentRoom = "global", isFull = true;
        let localStream, peerConnection;
        const servers = { iceServers: [{ urls: 'stun:stun1.l.google.com:19302' }] };

        // FLEXIBLE LOGIC
        function toggleFlexMode() {
            const vc = document.getElementById('video-container');
            const btn = document.getElementById('flex-btn');
            
            if (isFull) {
                // Switch to Small/Flexible
                vc.classList.remove('full-mode');
                vc.classList.add('small-mode');
                document.body.classList.remove('video-is-full');
                btn.innerText = "Full Screen";
                isFull = false;
            } else {
                // Switch to Full Screen
                vc.classList.remove('small-mode');
                vc.classList.add('full-mode');
                document.body.classList.add('video-is-full');
                btn.innerText = "Flexible Mode";
                isFull = true;
            }
        }

        // AUTH & ROOMS
        function tryLogin() {
            const user = document.getElementById('username-input').value.trim();
            const pass = document.getElementById('password-input').value.trim();
            if(user && pass) socket.emit('verify user', { username: user, password: pass });
        }
        socket.on('login success', (data) => {
            myName = data.username;
            document.getElementById('login-overlay').style.display = 'none';
            socket.emit('join room', 'global');
        });
        function changeRoom() {
            const room = document.getElementById('room-input').value.trim().toLowerCase();
            if (room) {
                currentRoom = room;
                document.getElementById('display-room').innerText = room;
                document.getElementById('history').innerHTML = '';
                socket.emit('join room', room);
                endCall();
            }
        }

        // CHAT
        function appendMessage(data) {
            const div = document.createElement('div');
            div.className = 'msg-row ' + (data.user === myName ? 'sent' : 'received');
            div.innerHTML = `<div class="bubble"><b>${data.user}</b><br>${data.text || ''}${data.image ? `<br><img src="${data.image}" style="max-width:180px; border-radius:10px;">` : ''}</div>`;
            const h = document.getElementById('history');
            h.appendChild(div);
            h.scrollTop = h.scrollHeight;
        }
        socket.on('chat message', appendMessage);
        socket.on('load history', (list) => list.forEach(appendMessage));
        document.getElementById('form').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('msg-input');
            if(input.value) {
                socket.emit('chat message', { user: myName, text: input.value, room: currentRoom });
                input.value = '';
            }
        };
        function sendPhoto(input) {
            const reader = new FileReader();
            reader.onload = (e) => socket.emit('chat message', { user: myName, image: e.target.result, room: currentRoom });
            reader.readAsDataURL(input.files[0]);
        }

        // CALLING
        async function setupCall() {
            document.getElementById('video-container').style.display = 'block';
            document.getElementById('call-controls').style.display = 'flex';
            document.body.classList.add('video-is-full'); // Start in Full Screen (Chat hidden)
            
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video').srcObject = localStream;
            peerConnection = new RTCPeerConnection(servers);
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            peerConnection.ontrack = (e) => document.getElementById('remote-video').srcObject = e.streams[0];
            peerConnection.onicecandidate = (e) => e.candidate && socket.emit('video-signal', { type: 'candidate', candidate: e.candidate, room: currentRoom });
        }

        async function startCall() {
            await setupCall();
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('video-signal', { type: 'offer', offer: offer, room: currentRoom });
        }

        socket.on('video-signal', async (data) => {
            if (!peerConnection && data.type === 'offer') await setupCall();
            if (data.type === 'offer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                socket.emit('video-signal', { type: 'answer', answer: answer, room: currentRoom });
            } else if (data.type === 'answer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            } else if (data.type === 'candidate') {
                await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });

        function endCall() {
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(peerConnection) peerConnection.close();
            peerConnection = null;
            document.getElementById('video-container').style.display = 'none';
            document.getElementById('call-controls').style.display = 'none';
            document.body.classList.remove('video-is-full');
            isFull = true;
        }
    </script>
</body>
</html>
