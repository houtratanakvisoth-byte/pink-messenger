<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Messenger | Live</title>
    <style>
        :root {
            --pink-primary: #ff527b;
            --pink-gradient: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            --pink-light: #fff0f3;
            --bg-gray: #f0f2f5;
            --text-dark: #050505;
            --bubble-gray: #e4e6eb;
        }

        body { margin: 0; font-family: sans-serif; background-color: var(--bg-gray); height: 100vh; display: flex; }
        .container { display: flex; width: 100vw; height: 100vh; background: #fff; }
        
        /* Sidebar */
        .sidebar { width: 300px; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; font-size: 24px; font-weight: bold; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--pink-primary); margin: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }

        /* Chat Area */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; }
        .messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* Bubbles */
        .bubble { max-width: 70%; padding: 12px; border-radius: 18px; font-size: 15px; }
        .received { background: var(--bubble-gray); align-self: flex-start; }
        .sent { background: var(--pink-gradient); color: white; align-self: flex-end; }

        /* Input */
        .input-box { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex-grow: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none; background: #f0f2f5; }
        button { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--pink-primary); }
    </style>
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">Pink Chat</div>
            <div style="display: flex; align-items: center; background: var(--pink-light);">
                <div class="avatar">GP</div>
                <span>Global Party</span>
            </div>
        </aside>

        <main class="chat-area">
            <div class="messages" id="history"></div>
            <form class="input-box" id="form">
                <input type="text" id="input" placeholder="Type a message..." autocomplete="off">
                <button type="submit">💖</button>
            </form>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const myId = "User_" + Math.floor(Math.random() * 1000);
        
        document.getElementById('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('input');
            if (input.value) {
                socket.emit('chat message', { user: myId, text: input.value });
                input.value = '';
            }
        });

        socket.on('chat message', (data) => {
            const div = document.createElement('div');
            div.classList.add('bubble');
            div.classList.add(data.user === myId ? 'sent' : 'received');
            div.textContent = (data.user === myId ? "" : data.user + ": ") + data.text;
            document.getElementById('history').appendChild(div);
            document.getElementById('history').scrollTop = document.getElementById('history').scrollHeight;
        });
    </script>
</body>
</html>
