<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pink Messenger | Responsive Video</title>
    <style>
        :root { --pink: #ff527b; --pink-grad: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Auth Overlay */
        #login-overlay { position: fixed; inset: 0; background: #fff0f3; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 85%; max-width: 350px; }
        .login-box input, .login-box select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #eee; border-radius: 25px; outline: none; font-size: 16px; }
        .login-box button { background: var(--pink-grad); color: white; border: none; width: 100%; padding: 14px; border-radius: 25px; font-weight: bold; cursor: pointer; }

        /* Room Header */
        .header { background: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; z-index: 10; }
        .room-info { font-weight: bold; color: var(--pink); }

        /* VIDEO AREA - The Flexible Part */
        #video-container { 
            display: none; 
            background: #000; 
            position: relative; 
            width: 100%; 
            transition: all 0.3s ease;
            aspect-ratio: 16/9; /* Keeps it looking like a screen */
            max-height: 40vh; 
        }
        #video-container.minimized { aspect-ratio: auto; height: 60px; }
        
        video { width: 100%; height: 100%; object-fit: cover; background: #222; }
        #local-video { 
            position: absolute; bottom: 10px; right: 10px; width: 25%; 
            max-width: 120px; border: 2px solid white; border-radius: 8px; z-index: 5;
        }
        .video-controls { position: absolute; top: 10px; left: 10px; display: flex; gap: 8px; z-index: 10; }
        .v-btn { padding: 6px 12px; border-radius: 20px; border: none; font-size: 12px; font-weight: bold; cursor: pointer; }

        /* Chat Area */
        .messages { flex-grow: 1; overflow-y: auto; padding: 15px; background: white; display: flex; flex-direction: column; gap: 8px; }
        .msg-row { display: flex; gap: 8px; }
        .msg-row.sent { flex-direction: row-reverse; }
        .bubble { padding: 10px 14px; border-radius: 18px; background: #f0f0f0; max-width: 75%; font-size: 15px; line-height: 1.4; }
        .sent .bubble { background: var(--pink-grad); color: white; }

        /* Input Area */
        .input-area { padding: 10px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; }
        #msg-input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #eee; outline: none; background: #f8f9fa; }
        .action-btn { background: none; border: none; font-size: 24px; cursor: pointer; padding: 0; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color: var(--pink)">🌸 Pink Messenger</h2>
            <input type="text" id="username-input" placeholder="Nickname">
            <input type="password" id="password-input" placeholder="Secret Password">
            <select id="avatar-input">
                <option value="💖">💖 Heart</option>
                <option value="🦄">🦄 Unicorn</option>
                <option value="🐱">🐱 Kitten</option>
                <option value="🦊">🦊 Fox</option>
            </select>
            <button onclick="tryLogin()">Enter Chat</button>
            <p id="error-msg" style="color: red; font-size: 12px;"></p>
        </div>
    </div>

    <div class="header">
        <div class="room-info">Room: <span id="display-room">global</span></div>
        <div style="display:flex; gap:5px;">
            <button class="v-btn" style="background:#4CAF50; color:white;" onclick="startCall()">📞 Call</button>
            <input type="text" id="room-input" placeholder="ID" style="width:40px; border-radius:10px; border:1px solid #ddd; padding:5px;">
            <button class="v-btn" style="background:var(--pink); color:white;" onclick="changeRoom()">Join</button>
        </div>
    </div>

    <div id="video-container">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        <div class="video-controls">
            <button class="v-btn" style="background:#ff4747; color:white;" onclick="endCall()">Hang Up</button>
            <button class="v-btn" style="background:rgba(255,255,255,0.9)" onclick="toggleVideoSize()" id="size-btn">🔳 Full</button>
            <button class="v-btn" style="background:rgba(255,255,255,0.9)" onclick="toggleScreenShare()">🖥️ Share</button>
        </div>
    </div>

    <div id="history" class="messages"></div>

    <form class="input-area" id="form">
        <button type="button" class="action-btn" onclick="document.getElementById('file-input').click()">📷</button>
        <input type="file" id="file-input" hidden onchange="sendPhoto(this)">
        <input type="text" id="msg-input" placeholder="Message..." autocomplete="off">
        <button type="submit" class="action-btn">💖</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "", myAvatar = "", currentRoom = "global";
        let localStream, peerConnection;
        const servers = { iceServers: [{ urls: 'stun:stun1.l.google.com:19302' }] };

        // UI Helpers
        function toggleVideoSize() {
            const container = document.getElementById('video-container');
            const btn = document.getElementById('size-btn');
            container.classList.toggle('minimized');
            btn.innerText = container.classList.contains('minimized') ? "Expand" : "Minimize";
        }

        // Auth
        function tryLogin() {
            const user = document.getElementById('username-input').value.trim();
            const pass = document.getElementById('password-input').value.trim();
            if(!user || !pass) return;
            socket.emit('verify user', { username: user, password: pass });
        }

        socket.on('login success', (data) => {
            myName = data.username;
            myAvatar = document.getElementById('avatar-input').value;
            document.getElementById('login-overlay').style.display = 'none';
            socket.emit('join room', 'global');
        });

        socket.on('login fail', (msg) => document.getElementById('error-msg').innerText = msg);

        // Room & Chat
        function changeRoom() {
            const input = document.getElementById('room-input');
            const room = input.value.trim().toLowerCase();
            if (room && room !== currentRoom) {
                currentRoom = room;
                document.getElementById('display-room').innerText = room;
                document.getElementById('history').innerHTML = '';
                socket.emit('join room', room);
                input.value = '';
                endCall();
            }
        }

        function appendMessage(data) {
            const div = document.createElement('div');
            div.className = 'msg-row ' + (data.user === myName ? 'sent' : 'received');
            div.innerHTML = `<div class="bubble"><b>${data.avatar} ${data.user}</b><br>${data.text || ''}${data.image ? `<img src="${data.image}" style="width:100%; border-radius:10px; margin-top:5px;">` : ''}</div>`;
            const h = document.getElementById('history');
            h.appendChild(div);
            h.scrollTop = h.scrollHeight;
        }

        socket.on('chat message', appendMessage);
        socket.on('load history', (list) => {
            document.getElementById('history').innerHTML = '';
            list.forEach(appendMessage);
        });

        document.getElementById('form').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('msg-input');
            if(input.value) {
                socket.emit('chat message', { user: myName, avatar: myAvatar, text: input.value, room: currentRoom });
                input.value = '';
            }
        };

        function sendPhoto(input) {
            if (input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => socket.emit('chat message', { user: myName, avatar: myAvatar, image: e.target.result, room: currentRoom });
                reader.readAsDataURL(input.files[0]);
            }
        }

        // WebRTC
        async function startCall() {
            document.getElementById('video-container').style.display = 'block';
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video').srcObject = localStream;
            peerConnection = new RTCPeerConnection(servers);
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            peerConnection.ontrack = (e) => document.getElementById('remote-video').srcObject = e.streams[0];
            peerConnection.onicecandidate = (e) => e.candidate && socket.emit('video-signal', { type: 'candidate', candidate: e.candidate, room: currentRoom });
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('video-signal', { type: 'offer', offer: offer, room: currentRoom });
        }

        socket.on('video-signal', async (data) => {
            if (!peerConnection && data.type === 'offer') {
                document.getElementById('video-container').style.display = 'block';
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = localStream;
                peerConnection = new RTCPeerConnection(servers);
                localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
                peerConnection.ontrack = (e) => document.getElementById('remote-video').srcObject = e.streams[0];
                peerConnection.onicecandidate = (e) => e.candidate && socket.emit('video-signal', { type: 'candidate', candidate: e.candidate, room: currentRoom });
            }
            if (data.type === 'offer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                socket.emit('video-signal', { type: 'answer', answer: answer, room: currentRoom });
            } else if (data.type === 'answer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            } else if (data.type === 'candidate') {
                await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });

        async function toggleScreenShare() {
            const screen = await navigator.mediaDevices.getDisplayMedia({ video: true });
            const track = screen.getVideoTracks()[0];
            const sender = peerConnection.getSenders().find(s => s.track.kind === 'video');
            sender.replaceTrack(track);
            track.onended = () => sender.replaceTrack(localStream.getVideoTracks()[0]);
        }

        function endCall() {
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(peerConnection) peerConnection.close();
            peerConnection = null;
            document.getElementById('video-container').style.display = 'none';
        }
    </script>
</body>
</html>
