<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pink Messenger | Mobile Pro</title>
    <style>
        :root { --pink: #ff527b; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: -apple-system, sans-serif; background: #fff; overflow: hidden; }

        /* --- MOBILE VIDEO LAYER --- */
        #video-app-layer {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            flex-direction: column;
        }

        /* Remote Video: Takes full height on phones */
        #remote-video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Professional full-bleed look on mobile */
        }

        /* Self Preview: Smaller for mobile */
        #local-video { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            width: 90px; 
            height: 130px;
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.3);
            z-index: 1001;
            object-fit: cover;
        }

        /* MOBILE CONTROL BAR */
        .call-controls {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            background: rgba(30, 30, 30, 0.7);
            backdrop-filter: blur(15px);
            padding: 12px;
            border-radius: 40px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1002;
        }

        .control-btn {
            width: 55px; height: 55px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; color: white;
        }

        .btn-end { background: #ff3b30; }
        .btn-util { background: rgba(255,255,255,0.15); }

        /* MINI MODE FOR CHATTING */
        #video-app-layer.mini-mode {
            inset: auto;
            top: 10px; right: 10px;
            width: 140px; height: 200px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .mini-mode .call-controls { bottom: 5px; width: 90%; padding: 5px; background: none; }
        .mini-mode .control-btn { width: 35px; height: 35px; font-size: 14px; }
        .mini-mode #local-video { display: none; } /* Hide self in mini mode */

        /* CHAT UI */
        #chat-interface { display: flex; flex-direction: column; height: 100vh; }
        .header { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #fafafa; }
        .bubble { padding: 12px; border-radius: 18px; background: #fff; border: 1px solid #eee; max-width: 80%; font-size: 15px; }
