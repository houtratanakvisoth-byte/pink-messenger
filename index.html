<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pink Messenger | Pro</title>
    <style>
        :root { --pink: #ff527b; --light-pink: #fff0f3; --pink-grad: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--light-pink); overflow: hidden; }

        /* --- LOGIN --- */
        #login-overlay { position: fixed; inset: 0; background: var(--light-pink); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-box { background: white; padding: 40px; border-radius: 30px; text-align: center; width: 320px; box-shadow: 0 15px 35px rgba(255, 82, 123, 0.15); }
        .login-box input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #eee; box-sizing: border-box; outline: none; }
        .btn-pink { background: var(--pink-grad); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; }
        
        /* --- CHAT INTERFACE --- */
        #chat-interface { display: none; flex-direction: column; height: 100vh; }
        .header { padding: 15px 20px; background: white; border-bottom: 1px solid #ffe0e6; display: flex; justify-content: space-between; align-items: center; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { padding: 12px 16px; border-radius: 20px; background: white; max-width: 75%; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .sent .bubble { background: var(--pink-grad); color: white; align-self: flex-end; }
        .input-area { padding: 15px 20px 35px; background: white; border-top: 1px solid #ffe0e6; display: flex; gap: 12px; }
        #msg-input { flex: 1; padding: 14px 20px; border-radius: 30px; border: 1px solid #ffe0e6; outline: none; }

        /* --- VIDEO --- */
        #video-app-layer { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { position: absolute; top: 20px; right: 20px; width: 100px; height: 140px; border-radius: 15px; border: 2px solid #fff; object-fit: cover; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h1 style="color:var(--pink);">🌸 Pink Messenger</h1>
            <input type="text" id="username-input" placeholder="Nickname">
            <input type="password" id="password-input" placeholder="Password">
            <button id="login-btn" class="btn-pink" onclick="tryLogin()">Enter Chat</button>
            <p id="login-error" style="color: red; font-size: 12px; margin-top: 10px; display: none;">Invalid Login</p>
        </div>
    </div>

    <div id="video-app-layer">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        <button onclick="endCall()" style="position:absolute; bottom:40px; left:50%; transform:translateX(-50%); background:red; color:white; border:none; padding:15px 30px; border-radius:50px; font-weight:bold;">End Call</button>
    </div>

    <div id="chat-interface">
        <div class="header">
            <b style="color:var(--pink)">Room: <span id="active-room-title">global</span></b>
            <button onclick="startCall()" style="background:#4CAF50; color:white; border:none; padding:10px 18px; border-radius:12px; font-weight:bold;">📞 Call</button>
        </div>
        <div id="history" class="messages"></div>
        <form class="input-area" id="form">
            <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
            <button type="submit" class="btn-pink" style="width:50px;">↑</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "", currentRoom = "global";
        let localStream, peerConnection;
        const rtcConfig = { iceServers: [{ urls: 'stun:stun1.l.google.com:19302' }] };

        // --- LOGIN LOGIC ---
        function tryLogin() {
            const user = document.getElementById('username-input').value.trim();
            const pass = document.getElementById('password-input').value.trim();
            const btn = document.getElementById('login-btn');
            
            if(user && pass) {
                btn.innerText = "Connecting...";
                socket.emit('verify user', { username: user, password: pass });
            }
        }

        socket.on('login success', (data) => {
            myName = data.username;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('chat-interface').style.display = 'flex';
            socket.emit('join room', 'global');
        });

        socket.on('login failed', () => {
            document.getElementById('login-btn').innerText = "Enter Chat";
            document.getElementById('login-error').style.display = 'block';
        });

        // --- CHAT LOGIC ---
        socket.on('chat message', (data) => {
            const div = document.createElement('div');
            div.className = 'msg-row ' + (data.user === myName ? 'sent' : 'received');
            div.innerHTML = `<div class="bubble"><b>${data.user}</b><br>${data.text}</div>`;
            document.getElementById('history').appendChild(div);
            document.getElementById('history').scrollTop = document.getElementById('history').scrollHeight;
        });

        document.getElementById('form').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('msg-input');
            if(input.value) {
                socket.emit('chat message', { user: myName, text: input.value, room: currentRoom });
                input.value = '';
            }
        };

        // --- VIDEO CALL LOGIC ---
        async function startCall() {
            document.getElementById('video-app-layer').style.display = 'block';
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video').srcObject = localStream;

            peerConnection = new RTCPeerConnection(rtcConfig);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            peerConnection.ontrack = (e) => document.getElementById('remote-video').srcObject = e.streams[0];
            peerConnection.onicecandidate = (e) => e.candidate && socket.emit('video-signal', { type: 'candidate', candidate: e.candidate, room: currentRoom });

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('video-signal', { type: 'offer', offer: offer, room: currentRoom });
        }

        socket.on('video-signal', async (data) => {
            if (data.type === 'offer') {
                document.getElementById('video-app-layer').style.display = 'block';
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = localStream;
                peerConnection = new RTCPeerConnection(rtcConfig);
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                peerConnection.ontrack = (e) => document.getElementById('remote-video').srcObject = e.streams[0];
                peerConnection.onicecandidate = (e) => e.candidate && socket.emit('video-signal', { type: 'candidate', candidate: e.candidate, room: currentRoom });
                
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                socket.emit('video-signal', { type: 'answer', answer: answer, room: currentRoom });
            } else if (data.type === 'answer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            } else if (data.type === 'candidate') {
                await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });

        function endCall() {
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(peerConnection) peerConnection.close();
            document.getElementById('video-app-layer').style.display = 'none';
        }
    </script>
</body>
</html>
