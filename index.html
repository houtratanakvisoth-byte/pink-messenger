<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pink Messenger | Full Screen Video</title>
    <style>
        :root { --pink: #ff527b; --pink-grad: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: sans-serif; overflow: hidden; background: #000; }

        /* FULL SCREEN VIDEO LAYER */
        #video-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: none;
            background: #000;
            z-index: 1;
        }
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { 
            position: absolute; bottom: 80px; right: 20px; 
            width: 120px; border-radius: 12px; border: 2px solid white; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 10;
        }

        /* CHAT OVERLAY LAYER */
        .ui-layer {
            position: relative;
            z-index: 5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            pointer-events: none; /* Allows clicking through to video if needed */
        }

        .header { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(10px);
            padding: 10px 15px; 
            display: flex; justify-content: space-between; align-items: center;
            pointer-events: auto;
        }

        .messages { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; flex-direction: column; gap: 10px;
            pointer-events: auto;
            /* If video is on, chat becomes semi-transparent */
            background: rgba(255,255,255,0.9);
            transition: background 0.5s;
        }
        .video-active .messages { background: rgba(255,255,255,0.2); }

        .bubble { 
            padding: 10px 15px; border-radius: 18px; 
            background: white; color: #333; max-width: 75%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .sent .bubble { background: var(--pink-grad); color: white; }
        .msg-row { display: flex; gap: 8px; }
        .msg-row.sent { flex-direction: row-reverse; }

        .input-area { 
            padding: 15px; background: white; 
            display: flex; gap: 10px; pointer-events: auto;
        }
        #msg-input { 
            flex: 1; padding: 12px; border-radius: 25px; 
            border: 1px solid #ddd; outline: none; 
        }

        /* Call Controls */
        .controls { position: absolute; top: 70px; left: 15px; display: flex; gap: 10px; pointer-events: auto; }
        .btn { padding: 8px 15px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; color: white; }
        
        #login-overlay { 
            position: fixed; inset: 0; background: #fff0f3; 
            display: flex; justify-content: center; align-items: center; z-index: 100; pointer-events: auto;
        }
        .login-box { background: white; padding: 30px; border-radius: 25px; text-align: center; width: 300px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color:var(--pink)">🌸 Pink Messenger</h2>
            <input type="text" id="username-input" placeholder="Nickname" style="width:90%; padding:10px; margin-bottom:10px; border-radius:20px; border:1px solid #ddd;">
            <input type="password" id="password-input" placeholder="Password" style="width:90%; padding:10px; margin-bottom:10px; border-radius:20px; border:1px solid #ddd;">
            <button onclick="tryLogin()" style="width:100%; padding:10px; border-radius:20px; border:none; background:var(--pink-grad); color:white; font-weight:bold;">Login</button>
            <p id="error-msg" style="color:red; font-size:12px;"></p>
        </div>
    </div>

    <div id="video-container">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
    </div>

    <div class="ui-layer" id="main-ui">
        <div class="header">
            <span style="font-weight:bold; color:var(--pink)">Room: <span id="display-room">global</span></span>
            <div>
                <input type="text" id="room-input" placeholder="Room ID" style="width:60px; border-radius:10px; border:1px solid #ddd; padding:5px;">
                <button onclick="changeRoom()" style="background:var(--pink); color:white; border:none; padding:5px 10px; border-radius:10px;">Join</button>
                <button onclick="startCall()" style="background:#4CAF50; color:white; border:none; padding:5px 10px; border-radius:10px;">📞 Call</button>
            </div>
        </div>

        <div class="controls" id="call-controls" style="display:none;">
            <button class="btn" style="background:#ff4747;" onclick="endCall()">Hang Up</button>
            <button class="btn" style="background:rgba(0,0,0,0.5);" onclick="toggleScreenShare()">🖥️ Share</button>
        </div>

        <div id="history" class="messages"></div>

        <form class="input-area" id="form">
            <button type="button" onclick="document.getElementById('file-input').click()" style="background:none; border:none; font-size:20px;">📷</button>
            <input type="file" id="file-input" hidden onchange="sendPhoto(this)">
            <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
            <button type="submit" style="background:none; border:none; font-size:20px;">💖</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "", myAvatar = "💖", currentRoom = "global";
        let localStream, peerConnection;
        const servers = { iceServers: [{ urls: 'stun:stun1.l.google.com:19302' }] };

        // AUTH
        function tryLogin() {
            const user = document.getElementById('username-input').value.trim();
            const pass = document.getElementById('password-input').value.trim();
            if(user && pass) socket.emit('verify user', { username: user, password: pass });
        }

        socket.on('login success', (data) => {
            myName = data.username;
            document.getElementById('login-overlay').style.display = 'none';
            socket.emit('join room', 'global');
        });

        // ROOMS
        function changeRoom() {
            const room = document.getElementById('room-input').value.trim().toLowerCase();
            if (room) {
                currentRoom = room;
                document.getElementById('display-room').innerText = room;
                document.getElementById('history').innerHTML = '';
                socket.emit('join room', room);
                endCall();
            }
        }

        // CHAT
        function appendMessage(data) {
            const div = document.createElement('div');
            div.className = 'msg-row ' + (data.user === myName ? 'sent' : 'received');
            div.innerHTML = `<div class="bubble"><b>${data.user}</b><br>${data.text || ''}${data.image ? `<br><img src="${data.image}" style="max-width:200px; border-radius:10px;">` : ''}</div>`;
            const h = document.getElementById('history');
            h.appendChild(div);
            h.scrollTop = h.scrollHeight;
        }

        socket.on('chat message', appendMessage);
        socket.on('load history', (list) => list.forEach(appendMessage));

        document.getElementById('form').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('msg-input');
            if(input.value) {
                socket.emit('chat message', { user: myName, text: input.value, room: currentRoom });
                input.value = '';
            }
        };

        function sendPhoto(input) {
            const reader = new FileReader();
            reader.onload = (e) => socket.emit('chat message', { user: myName, image: e.target.result, room: currentRoom });
            reader.readAsDataURL(input.files[0]);
        }

        // VIDEO CALL
        async function startCall() {
            document.getElementById('video-container').style.display = 'block';
            document.getElementById('call-controls').style.display = 'flex';
            document.getElementById('main-ui').classList.add('video-active');

            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video').srcObject = localStream;

            peerConnection = new RTCPeerConnection(servers);
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            peerConnection.ontrack = (e) => document.getElementById('remote-video').srcObject = e.streams[0];
            peerConnection.onicecandidate = (e) => e.candidate && socket.emit('video-signal', { type: 'candidate', candidate: e.candidate, room: currentRoom });
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('video-signal', { type: 'offer', offer: offer, room: currentRoom });
        }

        socket.on('video-signal', async (data) => {
            if (!peerConnection && data.type === 'offer') {
                document.getElementById('video-container').style.display = 'block';
                document.getElementById('call-controls').style.display = 'flex';
                document.getElementById('main-ui').classList.add('video-active');
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = localStream;
                peerConnection = new RTCPeerConnection(servers);
                localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
                peerConnection.ontrack = (e) => document.getElementById('remote-video').srcObject = e.streams[0];
                peerConnection.onicecandidate = (e) => e.candidate && socket.emit('video-signal', { type: 'candidate', candidate: e.candidate, room: currentRoom });
            }
            if (data.type === 'offer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                socket.emit('video-signal', { type: 'answer', answer: answer, room: currentRoom });
            } else if (data.type === 'answer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            } else if (data.type === 'candidate') {
                await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });

        function endCall() {
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(peerConnection) peerConnection.close();
            peerConnection = null;
            document.getElementById('video-container').style.display = 'none';
            document.getElementById('call-controls').style.display = 'none';
            document.getElementById('main-ui').classList.remove('video-active');
        }

        async function toggleScreenShare() {
            const screen = await navigator.mediaDevices.getDisplayMedia({ video: true });
            const track = screen.getVideoTracks()[0];
            const sender = peerConnection.getSenders().find(s => s.track.kind === 'video');
            sender.replaceTrack(track);
            track.onended = () => sender.replaceTrack(localStream.getVideoTracks()[0]);
        }
    </script>
</body>
</html>
